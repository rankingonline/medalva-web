<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medalva - Inicio</title>
    <!-- Basic styles inside index to provide a premium look even initially -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;800&display=swap');

        body {
            font-family: 'Nunito Sans', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #f0f4f8 0%, #d9e2ec 100%);
        }

        main {
            text-align: center;
            padding: 3rem 2rem;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05), 0 1px 3px rgba(0, 0, 0, 0.03);
            backdrop-filter: blur(10px);
            max-width: 500px;
            width: 90%;
            transition: transform 0.3s ease;
        }

        main:hover {
            transform: translateY(-5px);
        }

        h1 {
            color: #AA1745;
            margin-top: 1.5rem;
            margin-bottom: 0.5rem;
            font-size: 2rem;
        }

        p {
            color: #AA1745;
            margin-bottom: 2rem;
            font-size: 1.1rem;
        }

        a {
            display: inline-block;
            padding: 0.875rem 2rem;
            background-color: #AA1745;
            color: #fff;
            font-weight: 600;
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 10px rgba(170, 23, 69, 0.3);
        }

        a:hover {
            background-color: #881237;
            box-shadow: 0 6px 15px rgba(170, 23, 69, 0.4);
            transform: translateY(-2px);
        }
    </style>
</head>

<body>
    <main>
        <img src="assets/img/logo.svg" alt="Medalva Logo" width="180" height="auto">
        <h1>Bienvenido</h1>
        <p>Esta es la página principal que has solicitado en el scaffolding.</p>
        <a href="src/about_us/index.html">Ir a About Us</a>
    </main>
</body>

</html>
